name: Java Build and Run Pipeline

on:
  workflow_dispatch:
    inputs:
      repository:
        description: 'Target repository (owner/repo)'
        required: true
        type: string
      branch:
        description: 'Branch to build'
        required: false
        default: 'main'
        type: string
      java_version:
        description: 'Java version'
        required: false
        default: '21'
        type: choice
        options:
          - '11'
          - '17'
          - '21'
      maven_goals:
        description: 'Maven goals to execute'
        required: false
        default: 'clean install'
        type: string
      run_application:
        description: 'Run application after build'
        required: false
        default: true
        type: boolean

  repository_dispatch:
    types: [java-build-trigger]

jobs:
  build-and-run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout target repository
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.inputs.repository || github.event.client_payload.repository }}
          ref: ${{ github.event.inputs.branch || github.event.client_payload.branch || 'main' }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ github.event.inputs.java_version || github.event.client_payload.java_version || '21' }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Display Java version
        run: |
          echo "Java version:"
          java -version
          echo ""
          echo "Maven version:"
          mvn -version

      - name: Build with Maven
        run: |
          echo "Building with Maven goals: ${{ github.event.inputs.maven_goals || github.event.client_payload.maven_goals || 'clean install' }}"
          mvn ${{ github.event.inputs.maven_goals || github.event.client_payload.maven_goals || 'clean install' }}

      - name: Find JAR file
        id: find-jar
        if: ${{ (github.event.inputs.run_application == 'true' || github.event.client_payload.run_application == true) }}
        run: |
          JAR_FILE=$(find target -name "*.jar" -not -name "*-sources.jar" -not -name "*-javadoc.jar" | head -n 1)
          echo "jar_file=$JAR_FILE" >> $GITHUB_OUTPUT
          echo "Found JAR: $JAR_FILE"

      - name: Run Java application
        if: ${{ (github.event.inputs.run_application == 'true' || github.event.client_payload.run_application == true) && steps.find-jar.outputs.jar_file != '' }}
        run: |
          echo "Running application..."
          java -jar ${{ steps.find-jar.outputs.jar_file }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-artifacts
          path: |
            target/*.jar
            target/surefire-reports/
          retention-days: 7

      - name: Build summary
        if: always()
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Repository**: ${{ github.event.inputs.repository || github.event.client_payload.repository }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch**: ${{ github.event.inputs.branch || github.event.client_payload.branch || 'main' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Java Version**: ${{ github.event.inputs.java_version || github.event.client_payload.java_version || '21' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Maven Goals**: ${{ github.event.inputs.maven_goals || github.event.client_payload.maven_goals || 'clean install' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Build Status**: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY

# CI registration touch (no functional change): ensures GitHub indexes this workflow for workflow_dispatch.
